# Publishing a theme somebody submitted through the issue form.
#
# The shape of it: read the issue, check it, and either say why it cannot be published or open a
# pull request adding it and merge that. The issue's labels say where a submission has got to at
# every point — new-theme (submitted) -> invalid or accepted -> merged.
#
# All the judgement is in tools/submit.mjs, and everything after the verdict is in
# .github/actions/theme-change, which this shares with the update and remove flows. This file is
# only which script, which words, and when to run at all — which is why the rules can be tested with
# `node --test` and this cannot.

name: Publish a theme

on:
  issues:
    # Not `labeled`: the issue form attaches the `new-theme` label at creation, and GitHub fires
    # `opened` and `labeled` for that within the same second — both pass the guard below, so this
    # workflow used to run twice on every submission and post its comment twice. `edited` is the
    # documented way to force a recheck (README: "edit the issue... it will be checked again"), so
    # nothing is lost by dropping `labeled`; a stray relabel was never a supported way to re-run this.
    types: [opened, edited, reopened]

permissions:
  contents: write
  issues: write
  pull-requests: write

# One run at a time per issue. Editing an issue twice in quick succession otherwise has two runs
# pushing the same branch and racing to merge it.
concurrency:
  group: new-theme-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  publish:
    # A theme already merged is finished with: its issue is closed, and an edit to it now cannot
    # unpublish or change anything. Removing the merged label is how you deliberately re-run one.
    if: >-
      contains(github.event.issue.labels.*.name, 'new-theme') &&
      !contains(github.event.issue.labels.*.name, 'merged')
    runs-on: ubuntu-latest

    steps:
      # Pinned to a commit SHA — see the note in .github/actions/theme-change. It cannot live in
      # there with the rest: an action in this repository cannot be what fetches this repository.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: ./.github/actions/theme-change
        with:
          script: tools/submit.mjs
          branch: theme
          title: Add the theme "%NAME%"
          pr-body: Adds `themes/%ID%.json` and rebuilds `index.json`.
          merged-comment: Published in #%PR% — **“%NAME_MD%”** is in the gallery now. Thank you!
          token: ${{ secrets.GITHUB_TOKEN }}
